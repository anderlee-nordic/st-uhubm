name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install -e .
          python -m pip install -r docs/requirements.txt
      - run: python -m sphinx -b html -W docs docs/_build/html
